<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin CBT SMK</title>

<style>
:root {
  --sidebar:#2c3e50;
  --bg:#f4f6f9;
  --blue:#3498db;
  --green:#28a745;
  --red:#e74c3c;
}

body { display:flex; margin:0; font-family:Segoe UI; background:var(--bg); }

#sidebar {
  width:250px; height:100vh;
  background:var(--sidebar); color:white;
  position:fixed;
}

.side-header {
  padding:20px; text-align:center;
  font-weight:bold; border-bottom:1px solid #444;
}

.nav-item {
  padding:15px; cursor:pointer;
}
.nav-item:hover,.active {
  background:#34495e;
}

#main {
  margin-left:250px;
  padding:25px;
  width:100%;
}

.panel {
  display:none;
  background:white;
  padding:20px;
  border-radius:8px;
}
.panel.active { display:block; }

input,select,textarea {
  width:100%; padding:10px;
  margin:6px 0;
  border:1px solid #ddd;
  border-radius:5px;
}

.btn {
  padding:10px;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:5px;
}
.btn-blue { background:var(--blue); }
.btn-green { background:var(--green); }
.btn-red { background:var(--red); }

table {
  width:100%;
  border-collapse:collapse;
}
td,th {
  border:1px solid #eee;
  padding:8px;
}
</style>
</head>

<body>

<div id="sidebar">
  <div class="side-header">ADMIN CBT</div>
  <div class="nav-item active" onclick="showPanel('dash',this)">Dashboard</div>
  <div class="nav-item" onclick="showPanel('soal',this)">Kelola Soal</div>
</div>

<div id="main">

<!-- DASHBOARD -->
<div id="dash" class="panel active">
  <h2>Jadwal Ujian</h2>
  <table>
    <thead>
      <tr>
        <th>Mapel</th>
        <th>Kelas</th>
        <th>Jurusan</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="jadwal"></tbody>
  </table>
</div>

<!-- SOAL -->
<div id="soal" class="panel">

<h3>Input Soal (Support Multi Kelas)</h3>

<label>Nama Mapel</label>
<input id="mapel">

<label>Tingkat</label>
<select id="tingkat">
<option>X</option>
<option>XI</option>
<option>XII</option>
</select>

<label>Jurusan (Multi)</label>
<select id="jurusan" multiple>
<option value="umum">Umum</option>
<option value="TSM">TSM</option>
<option value="BP">BP</option>
<option value="AK">AK</option>
</select>

<!-- 🔥 INI YANG PALING PENTING -->
<label>Kelas / Rombel (Bisa Lebih dari 1)</label>
<input id="kelas"
placeholder="Contoh: XI TSM 1, XI TSM 2, XI BP">

<small>Gunakan koma untuk banyak kelas</small>

<label>Pertanyaan</label>
<textarea id="soalText"></textarea>

<label>Opsi</label>
<input id="o1" placeholder="A">
<input id="o2" placeholder="B">
<input id="o3" placeholder="C">
<input id="o4" placeholder="D">

<label>Kunci</label>
<input id="kunci">

<button class="btn btn-blue" onclick="simpan()">Simpan</button>

</div>

</div>

<script>

function showPanel(id,el){
 document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'))
 document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'))
 document.getElementById(id).classList.add('active')
 el.classList.add('active')
}

async function simpan(){

 const jurusan = Array.from(document.getElementById("jurusan").selectedOptions)
 .map(o=>o.value).join(",")

 const data = {
  action:"inputSoal",
  mapel:document.getElementById("mapel").value,
  tingkat:document.getElementById("tingkat").value,
  jurusan:jurusan,

  // 🔥 MULTI KELAS
  kelas:document.getElementById("kelas").value,

  pertanyaan:document.getElementById("soalText").value,
  opsi:[
    o1.value,o2.value,o3.value,o4.value
  ],
  kunci:kunci.value
 }

 await fetch("YOUR_URL",{
  method:"POST",
  body:JSON.stringify(data)
 })

 alert("Soal tersimpan")
}

</script>

</body>
</html>
