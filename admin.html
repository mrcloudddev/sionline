<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Dashboard SMK - Pak Dwi</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding: 20px; background: #f0f2f5; font-family: sans-serif; }
        .admin-nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { padding: 12px 20px; cursor: pointer; background: #ddd; border: none; border-radius: 8px; font-weight: bold; }
        .tab-btn.active { background: #1a237e; color: white; }
        .tab-content { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        
        /* Form Styling */
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; }
        .btn-action { padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; width: 100%; margin-top: 10px; }
        
        /* Table & Camera */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #1a237e; color: white; }
        video { width: 100%; max-width: 320px; border-radius: 10px; border: 3px solid #1a237e; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>DASHBOARD SMK MANDIRI</h1>
    <div class="admin-nav">
        <button id="btn-tab-monitor" class="tab-btn active" onclick="switchTab('monitoring')">Monitoring & Backup</button>
        <button id="btn-tab-soal" class="tab-btn" onclick="switchTab('input-soal')">Input Soal Baru</button>
        <button id="btn-tab-absen" class="tab-btn" onclick="switchTab('absensi')">Absensi Guru (Selfie)</button>
    </div>

    <div id="monitoring" class="tab-content">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button onclick="handleBackup()" style="background: #2e7d32; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">☁️ Cloud Backup Nilai</button>
            <button onclick="muatRekap()" style="padding: 10px 20px; border-radius: 5px; cursor: pointer;">🔄 Refresh Data</button>
        </div>
        <table>
            <thead><tr><th>Waktu</th><th>Nama Siswa</th><th>Kelas</th><th>Nilai</th></tr></thead>
            <tbody id="tabel-rekap"></tbody>
        </table>
    </div>

    <div id="input-soal" class="tab-content hidden">
        <h3>Tambah Soal Baru</h3>
        <select id="s-tingkat"><option value="X BP">X BP</option><option value="XI BP">XI BP</option><option value="XII BP">XII BP</option></select>
        <input type="text" id="s-jurusan" value="Broadcasting">
        <textarea id="s-pertanyaan" placeholder="Pertanyaan (Gunakan [IMG]url[/IMG] jika ada gambar)"></textarea>
        <input type="text" id="opt-1" placeholder="Pilihan A"><input type="text" id="opt-2" placeholder="Pilihan B">
        <input type="text" id="opt-3" placeholder="Pilihan C"><input type="text" id="opt-4" placeholder="Pilihan D">
        <input type="text" id="s-kunci" placeholder="Kunci Jawaban (Harus sama persis salah satu pilihan)">
        <button class="btn-action" style="background: #1a237e;" onclick="simpanSoal()">SIMPAN KE DATABASE</button>
    </div>

    <div id="absensi" class="tab-content hidden">
        <h3>Absensi Kehadiran Guru</h3>
        <input type="text" id="nama-guru" placeholder="Nama Lengkap Guru">
        <video id="video" autoplay></video>
        <button onclick="takeSnapshot()" style="padding: 10px; margin-bottom: 10px; cursor: pointer;">📸 Ambil Foto Selfie</button>
        <canvas id="canvas" style="display:none;"></canvas>
        <div id="geo-status" style="color: red; font-weight: bold; margin: 10px 0;">Mengecek Lokasi (GPS)...</div>
        <button id="btn-absen" class="btn-action" style="background: gray;" onclick="kirimAbsen()" disabled>KIRIM ABSEN (HANYA DI SMK)</button>
    </div>

    <script>
        // GANTI DENGAN LINK APPS SCRIPT BAPAK
        const BASE_URL = "https://script.google.com/macros/s/AKfycbyjirhdtJ2xapDsVSAtGioeuVJ0t5azSXSE83QjE4y7QpliSbY_Z3trUC5zGkXWxUuw/exec";
        
        // --- KONFIGURASI GEOFENCING SMK ---
        const T_LAT = -6.1234; // Ganti dengan Lat SMK Bapak
        const T_LNG = 106.1234; // Ganti dengan Lng SMK Bapak
        let fotoData = "", lokasiData = "";

        // Fungsi Monitoring
        async function muatRekap() {
            const resp = await fetch(`${BASE_URL}?action=getRekapNilai`);
            const data = await resp.json();
            document.getElementById('tabel-rekap').innerHTML = data.map(r => `<tr><td>${new Date(r.waktu).toLocaleString('id-ID')}</td><td>${r.nama}</td><td>${r.kelas}</td><td><strong>${r.nilai}</strong></td></tr>`).join('');
        }

        async function handleBackup() {
            const resp = await fetch(`${BASE_URL}?action=backupNilai`);
            const res = await resp.json(); alert(res.pesan);
        }

        // Fungsi Input Soal
        async function simpanSoal() {
            const data = {
                action: "inputSoal",
                tingkat: document.getElementById('s-tingkat').value,
                jurusan: document.getElementById('s-jurusan').value,
                pertanyaan: document.getElementById('s-pertanyaan').value,
                opsi: [document.getElementById('opt-1').value, document.getElementById('opt-2').value, document.getElementById('opt-3').value, document.getElementById('opt-4').value],
                kunci: document.getElementById('s-kunci').value
            };
            await fetch(BASE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            alert("Soal Terkirim!"); location.reload();
        }

        // Fungsi Absensi & Lokasi
        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('video').srcObject = stream;
            navigator.geolocation.getCurrentPosition(pos => {
                lokasiData = `${pos.coords.latitude},${pos.coords.longitude}`;
                document.getElementById('geo-status').innerText = "✅ Lokasi Terverifikasi";
                document.getElementById('geo-status').style.color = "green";
                document.getElementById('btn-absen').disabled = false;
                document.getElementById('btn-absen').style.background = "#1a237e";
            });
        }

        function takeSnapshot() {
            const v = document.getElementById('video'); const c = document.getElementById('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0); fotoData = c.toDataURL('image/jpeg');
            alert("Foto Diambil!");
        }

        async function kirimAbsen() {
            const n = document.getElementById('nama-guru').value;
            await fetch(BASE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "absenGuru", namaGuru: n, foto: fotoData, lokasi: lokasiData, status: "Hadir" }) });
            alert("Absensi Berhasil!"); location.reload();
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(t).classList.remove('hidden');
            if(t === 'absensi') startCamera();
        }

        window.onload = muatRekap;
    </script>
</body>
</html>
