<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Admin - SMK Mandiri</title>

<style>
:root {
    --sidebar: #2c3e50;
    --bg: #f4f6f9;
    --blue: #3498db;
    --green: #28a745;
    --red: #e74c3c;
    --orange: #f39c12;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
}

body {
    display: flex;
    background: var(--bg);
}

#sidebar {
    width: 260px;
    height: 100vh;
    background: var(--sidebar);
    color: white;
    position: fixed;
}

.side-header {
    padding: 20px;
    font-weight: bold;
    border-bottom: 1px solid #4b545c;
    text-align: center;
}

.nav-item {
    padding: 15px 25px;
    cursor: pointer;
    display: flex;
    gap: 10px;
}

.nav-item:hover,
.nav-item.active {
    background: rgba(255,255,255,0.1);
    border-left: 5px solid var(--blue);
}

#main {
    flex: 1;
    margin-left: 260px;
    padding: 30px;
}

.panel {
    background: white;
    padding: 25px;
    border-radius: 8px;
    display: none;
}

.panel.active {
    display: block;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

th, td {
    border: 1px solid #eee;
    padding: 10px;
    font-size: 13px;
}

th {
    background: #f8f9fa;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ddd;
    border-radius: 5px;
}

select[multiple] {
    height: 100px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
    <div class="side-header">ADMIN SMK MANDIRI</div>

    <div class="nav-item active" onclick="showPanel('p-dash', this)">Dashboard</div>
    <div class="nav-item" onclick="showPanel('p-soal', this)">Kelola Soal</div>
    <div class="nav-item" onclick="showPanel('p-siswa', this)">Data Siswa</div>
    <div class="nav-item" onclick="showPanel('p-nilai', this)">Hasil Ujian</div>
</div>

<!-- MAIN -->
<div id="main">

<!-- DASHBOARD -->
<div id="p-dash" class="panel active">
    <h2>Kontrol Jadwal Ujian</h2>

    <table>
        <thead>
            <tr>
                <th>Mapel</th>
                <th>Kelas</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="t-jadwal"></tbody>
    </table>
</div>

<!-- SOAL -->
<div id="p-soal" class="panel">

    <h3>Input Soal</h3>

    <input type="hidden" id="edit-id">

    <label>Nama Mapel</label>
    <input type="text" id="i-mapel-nama">

    <label>Tingkatan</label>
    <select id="i-tingkat">
        <option>X</option>
        <option>XI</option>
        <option>XII</option>
    </select>

    <label>Jurusan (Bisa lebih dari 1)</label>
    <select id="i-jurusan" multiple>
        <option value="TSM">TSM</option>
        <option value="BP">BP</option>
        <option value="AK">AK</option>
    </select>

    <!-- 🔥 INI YANG DIPERBAIKI -->
    <label>Target Kelas (Multi)</label>
    <select id="i-rombel" multiple>
        <option value="XI TSM 1">XI TSM 1</option>
        <option value="XI TSM 2">XI TSM 2</option>
        <option value="XI BP">XI BP</option>
        <option value="XI AK">XI AK</option>
    </select>

    <label>Pertanyaan</label>
    <textarea id="q-text"></textarea>

    <label>Opsi</label>
    <input id="o1" placeholder="A">
    <input id="o2" placeholder="B">
    <input id="o3" placeholder="C">
    <input id="o4" placeholder="D">

    <label>Kunci</label>
    <input id="q-kunci">

    <button onclick="simpanSoal()">Simpan</button>

</div>

<!-- SISWA -->
<div id="p-siswa" class="panel">
    <h2>Data Siswa</h2>
    <table>
        <tbody id="t-siswa-body"></tbody>
    </table>
</div>

<!-- NILAI -->
<div id="p-nilai" class="panel">
    <h2>Nilai</h2>
    <table>
        <tbody id="t-nilai"></tbody>
    </table>
</div>

</div>

<script src="script-admin.js"></script>

</body>
</html>
