<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Admin - SMK Mandiri</title>

<style>
:root {
    --sidebar: #2c3e50;
    --bg: #f4f6f9;
    --blue: #3498db;
    --green: #28a745;
    --red: #e74c3c;
    --orange: #f39c12;
}
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
}
body { display: flex; background: var(--bg); }

#sidebar {
    width: 260px;
    height: 100vh;
    background: var(--sidebar);
    color: white;
    position: fixed;
}
.side-header {
    padding: 20px;
    font-weight: bold;
    border-bottom: 1px solid #4b545c;
    text-align: center;
}
.nav-item {
    padding: 15px 25px;
    cursor: pointer;
}
.nav-item.active {
    background: rgba(255,255,255,0.1);
    border-left: 5px solid var(--blue);
}

#main {
    flex: 1;
    margin-left: 260px;
    padding: 30px;
}

.panel {
    background: white;
    padding: 25px;
    border-radius: 8px;
    display: none;
}
.panel.active { display: block; }

input, select, textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ddd;
    border-radius: 5px;
}

.btn {
    padding: 10px;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}
.btn-blue { background: var(--blue); }

select[multiple] {
    height: 100px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
    <div class="side-header">ADMIN SMK MANDIRI</div>
    <div class="nav-item active" onclick="showPanel('p-soal', this)">📝 Kelola Soal</div>
</div>

<!-- MAIN -->
<div id="main">

<div id="p-soal" class="panel active">

<h3>Form Input/Edit Soal</h3>

<input type="hidden" id="edit-id">

<label>Nama Mapel</label>
<input type="text" id="i-mapel-nama">

<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">

<div>
<label>Tingkat</label>
<select id="i-tingkat">
<option>X</option>
<option>XI</option>
<option>XII</option>
</select>
</div>

<div>
<label>Jurusan</label>
<select id="i-jurusan" multiple>
<option value="umum">Umum</option>
<option value="TSM">TSM</option>
<option value="BP">BP</option>
<option value="AK">AK</option>
</select>
</div>

<div>
<label>Tipe</label>
<select id="i-tipe">
<option value="PG">PG</option>
<option value="IS">Isian</option>
</select>
</div>

</div>

<!-- 🔥 BAGIAN YANG DIUBAH -->
<label>Rombel (Bisa pilih lebih dari 1)</label>
<select id="i-rombel-multi" multiple>
<option value="X TSM 1">X TSM 1</option>
<option value="X TSM 2">X TSM 2</option>
<option value="X BP 1">X BP 1</option>
<option value="X AK 1">X AK 1</option>
</select>

<small>Bisa pilih lebih dari 1 kelas</small>

<!-- fallback lama -->
<input type="text" id="i-rombel" placeholder="Atau isi manual jika perlu">

<label>Pertanyaan</label>
<textarea id="q-text"></textarea>

<label>Opsi</label>
<input id="o1" placeholder="A">
<input id="o2" placeholder="B">
<input id="o3" placeholder="C">
<input id="o4" placeholder="D">

<label>Kunci</label>
<input id="q-kunci">

<button class="btn btn-blue" onclick="simpanSoal()">Simpan</button>

</div>
</div>

<script>
function simpanSoal() {

    // 🔥 ambil MULTI ROMBEL
    const multi = document.getElementById("i-rombel-multi");
    const rombels = Array.from(multi.selectedOptions).map(o => o.value);

    // fallback kalau kosong
    const rombelManual = document.getElementById("i-rombel").value;

    const tingkatFinal = rombels.length > 0 
        ? rombels.join(", ")
        : rombelManual;

    const data = {
        mapel: document.getElementById("i-mapel-nama").value,
        tingkat: tingkatFinal,
        soal: document.getElementById("q-text").value
    };

    console.log(data);
    alert("Data siap dikirim ✅");
}
</script>

</body>
</html>
