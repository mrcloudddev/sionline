<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT SMK - Ujian Online</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Animasi Loading Update */
        .loader {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #3498db;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 2s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #update-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 99999; text-align: center; font-family: 'Segoe UI', sans-serif;
        }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="login-container">
            <h2>LOGIN UJIAN</h2>
            <input type="text" id="username" placeholder="Masukkan NIS Anda...">
            <button id="btn-login" onclick="prosesLogin()">Mulai Ujian</button>
        </div>
    </div>

    <div id="exam-section" style="display: none;">
        <header>
            <div class="info-siswa">
                <span id="nama-siswa" class="nama">Nama Siswa</span>
                <span id="kelas-siswa" style="font-size: 12px; opacity: 0.8;">Kelas | Jurusan</span>
            </div>
            <div id="timer">00:00:00</div>
        </header>

        <div id="question-container"></div>

        <div style="text-align: center; margin-top: 30px; padding-bottom: 50px;">
            <button class="btn-submit" onclick="submitJawaban()">Akhiri & Kirim Jawaban</button>
        </div>
    </div>

    <script src="script.js"></script>

    <script>
        // Gunakan var agar scope benar-benar global
        var lastVersion = 0;

        async function cekPerubahanSoal() {
            // Cek apakah script.js sudah mendefinisikan BASE_URL
            if (typeof BASE_URL === 'undefined' || !BASE_URL) {
                console.log("Menunggu BASE_URL...");
                return;
            }

            try {
                // Gunakan anti-cache t= agar data selalu fresh
                const resp = await fetch(BASE_URL + "?action=checkUpdate&t=" + new Date().getTime());
                const data = await resp.json();
                
                // Logging untuk memantau di Console (seperti screenshot Bapak)
                console.log("Radar: Server=" + data.lastUpdate + " | Lokal=" + lastVersion);

                if (lastVersion === 0) {
                    lastVersion = data.lastUpdate;
                    return;
                }

                if (data.lastUpdate > lastVersion) {
                    console.log("Update Terdeteksi!");
                    tampilkanLoadingUpdate();
                }
            } catch (e) { 
                console.log("Radar: Koneksi sibuk/terputus."); 
            }
        }

        function tampilkanLoadingUpdate() {
            if (document.getElementById('update-overlay')) return;

            const overlay = document.createElement('div');
            overlay.id = 'update-overlay';
            overlay.innerHTML = `
                <div class="loader"></div>
                <h2 style="margin-top:20px;">PEMBARUAN DATA...</h2>
                <p style="padding: 0 20px; opacity: 0.8;">Guru baru saja memperbarui soal atau jadwal.<br>Halaman akan dimuat ulang otomatis.</p>
            `;
            document.body.appendChild(overlay);
            
            setTimeout(() => {
                location.reload();
            }, 2500);
        }

        // Jalankan radar sedikit terlambat agar script.js siap duluan
        setTimeout(() => {
            cekPerubahanSoal();
            // Interval cek setiap 30 detik
            setInterval(cekPerubahanSoal, 30000);
        }, 3000);
    </script>

</body>
</html>
