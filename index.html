<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ujian Online SMK</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="login-section" class="card">
            <h2>Login Siswa</h2>
            <p>Silakan masukkan NIS Anda untuk memulai ujian.</p>
            <input type="number" id="username" placeholder="Masukkan NIS Anda..." pattern="\d*">
            <button onclick="prosesLogin()" id="btn-login">Masuk Ujian</button>
        </div>

        <div id="exam-section" class="card" style="display:none;">
            <div class="header-fixed">
                <div id="timer">00:00:00</div>
                <div id="info-siswa"></div>
            </div>
            <div id="question-container"></div>
            <button onclick="submitJawaban()" class="btn-submit">Kirim Jawaban</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
