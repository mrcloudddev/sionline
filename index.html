<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT SMK - Ujian Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-section">
        <h2>LOGIN UJIAN</h2>
        <input type="text" id="username" placeholder="Masukkan NIS Anda...">
        <button id="btn-login" onclick="prosesLogin()">Mulai Ujian</button>
    </div>

    <div id="exam-section" style="display: none;">
        <header>
            <div class="info-siswa">
                <span id="nama-siswa" class="nama">Nama Siswa</span>
                <span id="kelas-siswa" style="font-size: 12px; opacity: 0.8;">Kelas | Jurusan</span>
            </div>
            <div id="timer">00:00:00</div>
        </header>

        <div id="question-container"></div>

        <div style="text-align: center; margin-top: 30px;">
            <button class="btn-submit" onclick="submitJawaban()">Akhiri & Kirim Jawaban</button>
        </div>
    </div>

    <script src="script.js"></script>

    <script>
let lastVersion = 0;

// Fungsi mengecek apakah ada perubahan soal dari Admin
async function cekPerubahanSoal() {
    try {
        const resp = await fetch(BASE_URL + "?action=checkUpdate");
        const data = await resp.json();
        
        // Jika ini pengecekan pertama, simpan versinya
        if (lastVersion === 0) {
            lastVersion = data.lastUpdate;
            return;
        }

        // Jika versi di server lebih baru dari versi di HP siswa
        if (data.lastUpdate > lastVersion) {
            tampilkanLoadingUpdate();
        }
    } catch (e) { console.log("Gagal cek update"); }
}

function tampilkanLoadingUpdate() {
    // Munculkan overlay loading penuh
    document.body.innerHTML += `
        <div id="update-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); color:white; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999;">
            <div class="loader"></div>
            <h2 style="margin-top:20px;">Memperbarui Soal...</h2>
            <p>Admin baru saja melakukan perbaikan soal.</p>
            <p>Mohon tunggu sebentar.</p>
        </div>
    `;
    
    // Tunggu 3 detik lalu reload halaman agar soal terbaru masuk
    setTimeout(() => {
        location.reload();
    }, 3000);
}

// Jalankan radar setiap 60 detik (60000 ms)
setInterval(cekPerubahanSoal, 60000);
</script>

<style>
/* Animasi Loading Sederhana */
.loader {
  border: 8px solid #f3f3f3;
  border-top: 8px solid #3498db;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  animation: spin 2s linear infinite;
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
    
</body>
</html>
