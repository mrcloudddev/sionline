<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT SMK - Ujian Online</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Animasi Loading untuk Update Otomatis */
        .loader {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #3498db;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 2s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Overlay Full Screen saat Update */
        #update-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 99999; text-align: center; font-family: 'Segoe UI', sans-serif;
        }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="login-container">
            <h2>LOGIN UJIAN</h2>
            <input type="text" id="username" placeholder="Masukkan NIS Anda...">
            <button id="btn-login" onclick="prosesLogin()">Mulai Ujian</button>
        </div>
    </div>

    <div id="exam-section" style="display: none;">
        <header>
            <div class="info-siswa">
                <span id="nama-siswa" class="nama">Nama Siswa</span>
                <span id="kelas-siswa" style="font-size: 12px; opacity: 0.8;">Kelas | Jurusan</span>
            </div>
            <div id="timer">00:00:00</div>
        </header>

        <div id="question-container">
            </div>

        <div style="text-align: center; margin-top: 30px; padding-bottom: 50px;">
            <button class="btn-submit" onclick="submitJawaban()">Akhiri & Kirim Jawaban</button>
        </div>
    </div>

    <script src="script.js"></script>

    <script>
        var lastVersion = 0;

async function cekPerubahanSoal() {
    if (typeof BASE_URL === 'undefined' || !BASE_URL) return;

    // 1. Ambil data login untuk tahu NIS siswa ini
    const savedSesi = localStorage.getItem("sesi_siswa");
    if(!savedSesi) return;
    const user = JSON.parse(savedSesi);
    const nisSiswa = user.nis || document.getElementById('username').value;

    try {
        // 2. Kirim NIS ke server agar server cek status izin TERBARU
        const resp = await fetch(`${BASE_URL}?action=checkUpdate&nis=${nisSiswa}&t=${new Date().getTime()}`);
        const data = await resp.json();
        
        // --- FITUR EKSEKUSI CEKAL ---
        if (data.izin === "Tidak" || data.izin === "tidak") {
            console.log("Akses dicabut oleh Admin!");
            alert("MAAF: Akses ujian Anda telah dicabut oleh Admin/Guru. Silakan hubungi pengawas.");
            
            // Hapus semua jejak pengerjaan
            localStorage.removeItem("sesi_siswa");
            localStorage.removeItem("jawaban_lokal");
            localStorage.removeItem("sisa_waktu");
            
            // Paksa kembali ke halaman login
            location.reload(); 
            return;
        }

        // --- FITUR UPDATE SOAL (RADAR BIASA) ---
        let serverVersion = data.lastUpdate || 1;
        if (lastVersion === 0) {
            lastVersion = serverVersion;
            return;
        }

        if (serverVersion > lastVersion) {
            tampilkanLoadingUpdate();
        }
    } catch (e) { 
        console.log("Radar: Gagal cek status."); 
    }
}

        function tampilkanLoadingUpdate() {
            // Mencegah overlay muncul ganda
            if (document.getElementById('update-overlay')) return;

            const overlay = document.createElement('div');
            overlay.id = 'update-overlay';
            overlay.innerHTML = `
                <div class="loader"></div>
                <h2 style="margin-top:20px;">PEMBARUAN DATA...</h2>
                <p style="padding: 0 20px; opacity: 0.8;">Admin baru saja melakukan perbaikan soal.<br>Jawaban Anda tersimpan, halaman akan memuat ulang.</p>
            `;
            document.body.appendChild(overlay);
            
            // Beri jeda 2.5 detik agar siswa bisa baca pesan sebelum reload
            setTimeout(() => {
                location.reload();
            }, 2500);
        }

        // Jalankan radar pertama kali setelah 5 detik agar script.js siap sepenuhnya
        setTimeout(() => {
            cekPerubahanSoal();
            // Interval pengecekan setiap 30 detik
            setInterval(cekPerubahanSoal, 30000);
        }, 5000);
    </script>

</body>
</html>
