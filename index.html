<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT SMK - Ujian Online</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Animasi Loading untuk Update Otomatis */
        .loader {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #3498db;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 2s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Overlay Full Screen saat Update */
        #update-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            text-align: center;
            font-family: 'Segoe UI', sans-serif;
        }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="login-container">
            <h2>LOGIN UJIAN</h2>
            <input type="text" id="username" placeholder="Masukkan NIS Anda...">
            <button id="btn-login" onclick="prosesLogin()">Mulai Ujian</button>
        </div>
    </div>

    <div id="exam-section" style="display: none;">
        <header>
            <div class="info-siswa">
                <span id="nama-siswa" class="nama">Nama Siswa</span>
                <span id="kelas-siswa" style="font-size: 12px; opacity: 0.8;">Kelas | Jurusan</span>
            </div>
            <div id="timer">00:00:00</div>
        </header>

        <div id="question-container">
            </div>

        <div style="text-align: center; margin-top: 30px; padding-bottom: 50px;">
            <button class="btn-submit" onclick="submitJawaban()">Akhiri & Kirim Jawaban</button>
        </div>
    </div>

    <script src="script.js"></script>

    <script>
        let lastVersion = 0;
        let radarStarted = false;

        // Fungsi mengecek apakah ada perubahan soal dari Admin
        async function cekPerubahanSoal() {
            // Radar hanya jalan kalau BASE_URL sudah terdefinisi di script.js
            if (typeof BASE_URL === 'undefined') return;

            try {
                const resp = await fetch(BASE_URL + "?action=checkUpdate");
                const data = await resp.json();
                
                // Simpan versi saat pertama kali halaman dimuat atau login
                if (lastVersion === 0) {
                    lastVersion = data.lastUpdate;
                    radarStarted = true;
                    console.log("Radar Aktif. Versi saat ini: " + lastVersion);
                    return;
                }

                // Jika versi di database (B1 System_Config) lebih besar dari versi lokal HP siswa
                if (data.lastUpdate > lastVersion) {
                    tampilkanLoadingUpdate();
                }
            } catch (e) { 
                console.log("Radar: Gagal terhubung ke server."); 
            }
        }

        function tampilkanLoadingUpdate() {
            // Mencegah overlay muncul berkali-kali
            if (document.getElementById('update-overlay')) return;

            // Tambahkan elemen overlay ke body
            const overlay = document.createElement('div');
            overlay.id = 'update-overlay';
            overlay.innerHTML = `
                <div class="loader"></div>
                <h2 style="margin-top:20px;">MEMPERBARUI SOAL...</h2>
                <p style="padding: 0 20px; opacity: 0.8;">Admin/Guru baru saja melakukan perbaikan data.<br>Halaman akan dimuat ulang otomatis dalam 3 detik.</p>
            `;
            document.body.appendChild(overlay);
            
            // Reload halaman setelah 3 detik
            setTimeout(() => {
                location.reload();
            }, 3000);
        }

        // Jalankan radar setiap 30 detik agar lebih responsif dibanding 60 detik
        setInterval(cekPerubahanSoal, 30000);
        
        // Cek update sekali saat pertama kali buka
        window.addEventListener('load', cekPerubahanSoal);
    </script>

</body>
</html>
