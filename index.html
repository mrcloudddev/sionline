<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CBT SMK - Ujian Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <div id="login-section" class="auth-card">
            <div class="auth-header">
                <img src="https://img.icons8.com/fluency/96/school.png" alt="logo">
                <h2>CBT SMK</h2>
                <p>Silakan login menggunakan NIS Anda.</p>
            </div>
            <div class="auth-body">
                <div class="input-group">
                    <label>NIS / Username</label>
                    <input type="number" id="username" placeholder="Masukkan NIS..." pattern="\d*">
                </div>
                <button onclick="prosesLogin()" class="btn-primary" id="btn-login">Mulai Ujian</button>
            </div>
        </div>

        <div id="exam-section" style="display:none;">
            <div class="exam-header-fixed">
                <div class="header-content">
                    <div id="info-siswa">
                        <span class="nama">Memuat...</span>
                        <span class="kelas-jurus">Loading...</span>
                    </div>
                    <div class="timer-wrapper">
                        <span id="timer">00:00:00</span>
                    </div>
                </div>
            </div>

            <div id="question-container" class="exam-body">
                </div>

            <div class="exam-footer">
                <button onclick="submitJawaban()" class="btn-submit">Akhiri & Kirim Jawaban</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
