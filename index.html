<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT SMK - Ujian Online</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .loader {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #3498db;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 2s linear infinite;
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }

        #update-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 99999; text-align: center;
        }

        header { 
            background: #1a2a6c; color: white; padding: 15px; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }

        .info-siswa { display: flex; flex-direction: column; }
        .nama { font-weight: bold; }
        .mapel-badge { 
            background: #f39c12; color: #000; padding: 2px 8px; 
            border-radius: 4px; font-size: 12px; margin-top: 5px;
        }

        #timer { font-size: 22px; font-weight: bold; color: #f1c40f; }
    </style>
</head>

<body>

<!-- LOGIN -->
<div id="login-section">
    <div class="login-container">
        <h2>LOGIN UJIAN</h2>
        <input type="text" id="username" placeholder="Masukkan NIS Anda...">
        <button id="btn-login" onclick="prosesLogin()">Mulai Ujian</button>
    </div>
</div>

<!-- UJIAN -->
<div id="exam-section" style="display: none;">
    <header>
        <div class="info-siswa">
            <span id="nama-siswa" class="nama">Nama</span>
            <span id="kelas-siswa">Kelas | Jurusan</span>
            <div id="mapel-aktif" class="mapel-badge">Memuat...</div>
        </div>
        <div id="timer">00:00</div>
    </header>

    <div id="question-container"></div>

    <div style="text-align:center; margin-top:30px;">
        <button class="btn-submit" onclick="submitJawaban()">Kirim Jawaban</button>
    </div>
</div>

<script src="script.js"></script>

<script>
let lastVersion = 0;
let radarInterval = null;

// ================= RADAR =================
async function cekPerubahanSoal() {
    try {
        if (!window.BASE_URL) return;

        const sesi = localStorage.getItem("sesi_siswa");
        if (!sesi) return;

        const user = JSON.parse(sesi);

        const resp = await fetch(`${BASE_URL}?action=checkUpdate&nis=${user.nis}&t=${Date.now()}`);
        const text = await resp.text();

        let data;
        try {
            data = JSON.parse(text);
        } catch {
            console.log("Bukan JSON:", text);
            return;
        }

        // 🔐 CEK IZIN
        if ((data.izin || "").toLowerCase() === "tidak") {
            alert("Akses ujian dicabut!");
            localStorage.clear();
            location.reload();
            return;
        }

        // 🔄 CEK UPDATE
        let serverVersion = data.lastUpdate || 1;

        if (lastVersion === 0) {
            lastVersion = serverVersion;
            return;
        }

        if (serverVersion > lastVersion) {
            tampilkanLoading();
        }

    } catch (e) {
        console.log("Radar error:", e);
    }
}

// ================= LOADING =================
function tampilkanLoading() {
    if (document.getElementById('update-overlay')) return;

    const overlay = document.createElement('div');
    overlay.id = 'update-overlay';
    overlay.innerHTML = `
        <div class="loader"></div>
        <h2>Memperbarui Soal...</h2>
        <p>Halaman akan dimuat ulang</p>
    `;

    document.body.appendChild(overlay);
    setTimeout(() => location.reload(), 2500);
}

// ================= START RADAR =================
function mulaiRadar() {
    if (radarInterval) return;
    radarInterval = setInterval(cekPerubahanSoal, 30000);
}

// ================= AUTO START =================
window.addEventListener("load", () => {
    const sesi = localStorage.getItem("sesi_siswa");
    if (sesi) {
        mulaiRadar();
    }
});
</script>

</body>
</html>
